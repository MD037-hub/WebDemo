<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eine kleine Frage... ❤️</title>
    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Pacifico&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Floating Hearts Background Container -->
    <div class="hearts-background" id="hearts-bg"></div>

    <!-- Main Card Container -->
    <main class="game-container">
        <!-- Main Question Card -->
        <section class="game-card active" id="card-question">
            <div class="card-icon">
                <i data-lucide="heart" class="heart-pulse"></i>
            </div>
            <h1 class="game-title">Liebst du mich? ❤️</h1>
            <p class="game-subtitle" id="troll-message">Beantworte diese Frage ehrlich! 😉</p>
            
            <div class="button-group" id="btn-group">
                <button class="btn btn-primary" id="btn-ja">Ja! ❤️</button>
                <button class="btn btn-secondary" id="btn-nein">Nein</button>
            </div>
        </section>

        <!-- FINAL: The Love Card -->
        <section class="game-card final-card" id="card-final">
            <div class="cat-image-container">
                <img src="cute_cat_roses.png" alt="Süße Katze mit Rosen" class="cat-image">
            </div>
            <h1 class="love-message" id="love-msg">Ich wusste es doch! 🥰</h1>
            <p class="love-subtext">Ich liebe dich auch über alles! ❤️</p>
            
            <button class="btn btn-replay" id="btn-replay">
                <i data-lucide="rotate-ccw"></i> Nochmal spielen
            </button>
        </section>
    </main>

    <!-- Backup Troll Modal for Keyboard / Edge Cases -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-card">
            <h2 class="modal-title">Nette Idee! 😜</h2>
            <p class="modal-text">Aber "Nein" ist heute leider ausverkauft. Bitte versuche es mit "Ja! ❤️".</p>
            <div class="button-group">
                <button class="btn btn-primary" id="modal-ok">Okay 👉👈</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
